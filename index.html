<!-- --- index.html --- -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Загрузка...</title>
    <!-- Официальный скрипт Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Чистый черный фон без лишних элементов */
        body {
            background-color: #000000;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }
        /* Стандартный крутящийся лоадер */
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border-left-color: #ffffff;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .text {
            margin-top: 18px;
            font-size: 13px;
            opacity: 0.5;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <!-- Крутящийся лоадер -->
    <div class="spinner"></div>
    <div class="text">Перенаправление...</div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand(); // Раскрываем окно на максимум

            // Считываем параметры
            const urlParams = new URLSearchParams(window.location.search);
            const botUsername = urlParams.get('bot');
            const token = urlParams.get('token');

            if (botUsername && token) {
                // Небольшая задержка в 0.5 секунды, чтобы пользователь увидел лоадер
                setTimeout(() => {
                    const redirectUrl = "https://t.me/" + botUsername + "?start=auth_" + token;
                    tg.openTelegramLink(redirectUrl); // Безопасно переходим в бота
                    tg.close(); // Закрываем WebApp-окно
                }, 500);
            } else {
                document.body.innerHTML = '<div style="opacity: 0.5; font-size: 13px;">Ошибка авторизации. Перезапустите бота.</div>';
            }
        });
    </script>
</body>
</html>
