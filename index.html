<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirect</title>
    <style>
        body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }
        a {
            color: #444444;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

<a id="redirect-link" href="#">Перейти в бота</a>

<script>
    // --- НАСТРОЙКА ЮЗЕРНЕЙМА ---
    // Укажите юзернейм вашего основного бота БЕЗ символа @
    const MAIN_BOT_USERNAME = "FFProjectBot"; 

    function performRedirect() {
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        let targetUrl = `https://t.me/${MAIN_BOT_USERNAME}`;
        
        if (token) {
            targetUrl = `https://t.me/${MAIN_BOT_USERNAME}?start=${token}`;
        }
        
        // Обновляем резервную ссылку на экране
        const link = document.getElementById('redirect-link');
        link.href = targetUrl;
        
        // Мгновенный редирект
        window.location.href = targetUrl;
    }

    performRedirect();
</script>

</body>
</html>
